version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - echo "SES_FROM_EMAIL=$SES_FROM_EMAIL" >> .env.production
        - echo "SES_TO_EMAIL=$SES_TO_EMAIL" >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
